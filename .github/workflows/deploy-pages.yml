# Build the Regent web demo (the wishlist funnel) and publish it to GitHub
# Pages. The demo is the free, no-install way to feel the "it ages while
# you're away" hook before wishlisting — so the build is gated on a green
# test suite: a red sim never ships to the demo.
#
# NOTE: the repo is private. GitHub Pages on a PRIVATE repo requires a paid
# plan (Pro/Team/Enterprise). On Free, either make the repo public or publish
# the built `dist/` to a separate public repo. Once Pages is enabled with
# "GitHub Actions" as the source (Settings -> Pages), this workflow deploys
# on every push to main. Until then the build/test job still runs and gates.
name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes cancel an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Gate the deploy on a green suite (tsc -b runs inside `build` too).
      - name: Test
        run: npm test

      # Project page lives at https://<user>.github.io/regent/, so assets
      # must resolve under /regent/. vite.config reads GITHUB_PAGES_BASE.
      - name: Build (Pages base)
        run: npm run build
        env:
          GITHUB_PAGES_BASE: /regent/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
