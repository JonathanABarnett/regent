name: Nightly health check

# Runs every day at 03:00 UTC against the default branch. Catches:
#   - dependency drift (new vulnerability disclosure)
#   - test flake (a test that passes locally but breaks under fresh install)
#   - upstream registry / CI infrastructure issues
# Opens an issue automatically on failure so you wake up to a flag.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install (fresh, no cache)
        run: npm ci

      - name: Audit (warn only)
        run: npm audit --audit-level=high --omit=dev || true

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Open issue on failure
        if: ${{ failure() }}
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `nightly health check failed — ${today}`,
              body: [
                `The nightly health check failed at ${today}.`,
                ``,
                `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Likely causes: dependency drift, new vulnerability disclosure, transient CI infrastructure issue.`,
                `If it's transient, close the issue. If it's real, fix and re-run via workflow_dispatch.`,
              ].join("\\n"),
              labels: ["nightly", "needs-triage"],
            });
