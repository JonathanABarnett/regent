name: Deploy demo to GitHub Pages

on:
  # Auto-deploy on every push to main
  push:
    branches: [main]
  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

# Concurrency: cancel in-flight deploys when a newer push comes in
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node 20 deprecation warnings

jobs:
  build:
    name: Build static demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install rsvg-convert (for SVG→PNG icon + og:image rendering)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install
        run: npm ci

      - name: Render PNG icons + og:image from SVG sources
        # PNG variants only exist on-the-fly in CI — keeping them out of the
        # repo means a single SVG source of truth for branding. Manifest +
        # index.html reference the PNG paths so this step has to land before
        # `npm run build` copies public/ into dist/.
        run: |
          set -euo pipefail
          cd public
          rsvg-convert -w 192 -h 192 icon.svg -o icon-192.png
          rsvg-convert -w 512 -h 512 icon.svg -o icon-512.png
          # Maskable icon: 80% inset on a solid bg so OS-applied rounded masks
          # don't crop the castle silhouette.
          rsvg-convert -w 512 -h 512 icon.svg -o icon-maskable.png
          rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png
          ls -la *.png

      - name: Build
        # GITHUB_PAGES_BASE makes Vite prefix all asset URLs with /kingdomos/
        # so the bundle works under the GitHub Pages subpath.
        env:
          GITHUB_PAGES_BASE: /kingdomos/
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
