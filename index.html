<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#1a1a2e" />

    <title>Regent — the kingdom that ages while you work</title>
    <meta
      name="description"
      content="Regent is a 16-bit medieval kingdom that ages on your real calendar while you work, brings you only its hardest questions, and writes a shareable chronicle of everything you missed. You are the conscience of the crown, not its hands."
    />

    <!-- Open Graph (Facebook, Discord, Slack, LinkedIn, most aggregators) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Regent — the kingdom that ages while you work" />
    <meta
      property="og:description"
      content="A medieval kingdom that lives on your desktop and ages on your real calendar. It rules itself; you decide its hardest questions on your breaks, and it remembers — and can lose — the people in it."
    />
    <meta property="og:url" content="https://jonathanabarnett.github.io/kingdomos/" />
    <meta property="og:site_name" content="Regent" />
    <!--
      og:image must be a raster image (PNG/JPG) for most social previews to
      render. The committed og-image.svg is the design source; render it to
      og-image.png with `npx svgexport public/og-image.svg public/og-image.png 1200:630`
      and the meta tag below will then produce previews on every major platform.
      The svg fallback is included so platforms that DO support SVG (Mastodon,
      Bluesky) still get a card.
    -->
    <meta property="og:image" content="https://jonathanabarnett.github.io/kingdomos/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A pixel-art castle under a night sky, with the wordmark KingdomOS below." />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Regent — the kingdom that ages while you work" />
    <meta
      name="twitter:description"
      content="A medieval kingdom that lives on your desktop and ages on your real calendar. It rules itself; you decide its hardest questions on your breaks, and it remembers — and can lose — the people in it."
    />
    <meta name="twitter:image" content="https://jonathanabarnett.github.io/kingdomos/og-image.png" />
    <meta name="twitter:image:alt" content="A pixel-art castle under a night sky, with the wordmark KingdomOS below." />

    <!-- Favicons + app icons -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Fonts. We were leaning on whatever monospace the OS happened to have
         when Press Start 2P wasn't installed (rare) — that fallback was the
         actual source of the "wall of pixels" feel. Loading both fonts
         explicitly keeps the retro identity but gives us a much more
         readable body face (VT323) while reserving Press Start 2P for
         brand moments, headings, and small badges. `display=swap` so we
         render with the system fallback first and upgrade when the
         webfont arrives — no flash-of-invisible-text. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
